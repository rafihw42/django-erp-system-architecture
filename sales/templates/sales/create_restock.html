{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Input Faktur Pembelian (PO)</title>
    
    <!-- Import jQuery and Select2 for the Searchable Dropdowns -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        body { font-family: 'Calibri', sans-serif; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* Header Form Grid */
        .header-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 6px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-control { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        textarea.form-control { resize: vertical; min-height: 80px; }

        /* Dynamic Table */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #333; color: white; }
        .text-right { text-align: right; }
        
        /* Buttons */
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-tambah { background-color: #007bff; color: white; margin-bottom: 15px; }
        .btn-tambah:hover { background-color: #0056b3; }
        .btn-hapus { background-color: #dc3545; color: white; padding: 6px 10px; font-size: 12px; }
        .btn-hapus:hover { background-color: #a71d2a; }
        .btn-simpan { background-color: #28a745; color: white; width: 100%; font-size: 16px; padding: 15px; margin-top: 20px; }
        .btn-simpan:hover { background-color: #1e7e34; }

        /* Totals Area */
        .totals-area { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; font-size: 18px; margin-top: 10px; }
        .totals-box { text-align: right; width: 350px; }
        .totals-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .grand-total-box { background: #e9ecef; padding: 15px; border-radius: 6px; border: 1px solid #ccc; margin-top: 10px; font-size: 20px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <h2>Faktur Pembelian Barang (Restock)</h2>

    <form method="POST" action="{% url 'create_restock' %}">
        {% csrf_token %}
        
        <!-- HEADER SECTION -->
        <div class="header-form">
            <div class="form-group">
                <label for="supplier">Supplier / Perusahaan</label>
                <select name="supplier" id="supplier" class="form-control" required>
                    <option value="">-- Pilih Supplier --</option>
                    {% for s in suppliers %}
                        <option value="{{ s.id }}">{{ s.nama_supplier }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="nomor_faktur">Nomor Faktur (PO)</label>
                <input type="text" name="nomor_faktur" id="nomor_faktur" class="form-control" placeholder="Contoh: SO/2605/0023" required>
            </div>

            <!-- NEW: Tanggal Picker triggers the 60-day math -->
            <div class="form-group">
                <label for="tanggal">Tanggal Faktur</label>
                <input type="date" name="tanggal" id="tanggal" class="form-control" required onchange="calculateTempo()">
            </div>

            <!-- UPDATED: Made readonly so user doesn't break the 60-day rule -->
            <div class="form-group">
                <label for="tanggal_jatuh_tempo">Tanggal Jatuh Tempo (Kredit 60 Hari)</label>
                <input type="date" name="tanggal_jatuh_tempo" id="tanggal_jatuh_tempo" class="form-control" required readonly>
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label for="catatan">Catatan Tambahan (Opsional)</label>
                <textarea name="catatan" id="catatan" class="form-control" placeholder="Kredit 60 Hari, dikirim via..."></textarea>
            </div>
        </div>

        <!-- ITEMS SECTION -->
        <button type="button" class="btn btn-tambah" onclick="addRow()">+ Tambah Baris Barang</button>
        
        <table id="items-table">
            <thead>
                <tr>
                    <th width="35%">Nama Barang</th>
                    <th width="15%">Qty</th>
                    <th width="20%">Harga Beli (Rp)</th>
                    <th width="20%" class="text-right">Subtotal (Rp)</th>
                    <th width="10%">Aksi</th>
                </tr>
            </thead>
            <tbody id="items-body">
                <!-- Javascript will inject rows here -->
            </tbody>
        </table>

        <!-- UPDATED: Finance Totals Section -->
        <div class="totals-area">
            <div class="totals-box">
                <div class="totals-row">
                    <strong>Sub Total:</strong>
                    <span id="subtotal-display">Rp 0</span>
                </div>
                <div class="totals-row">
                    <strong>PPN (%):</strong>
                    <input type="number" name="ppn_persen" id="ppn_persen" class="form-control" style="width: 80px; text-align: right;" value="0" min="0" oninput="calculateGrandTotal()">
                </div>
                <div class="totals-row grand-total-box">
                    <span>Grand Total:</span> 
                    <span id="grand-total-display">Rp 0</span>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-simpan">Simpan Faktur Pembelian & Update Stok</button>
    </form>
</div>

<!-- TEMPLATE ROW (Hidden) -->
<template id="row-template">
    <tr>
        <td>
            <!-- ADDED 'select2-product' CLASS HERE -->
            <select name="kode_barang[]" class="form-control select2-product" required>
                <option value="">-- Pilih Barang --</option>
                {% for p in products %}
                    <option value="{{ p.kode_barang }}">{{ p.kode_barang }} - {{ p.nama_barang }}</option>
                {% endfor %}
            </select>
        </td>
        <td>
            <input type="number" name="qty[]" class="form-control" min="1" placeholder="0" required oninput="calculateRow(this)">
        </td>
        <td>
            <input type="number" name="harga_beli[]" class="form-control" min="0" placeholder="0" required oninput="calculateRow(this)">
        </td>
        <td class="text-right subtotal-text" style="font-weight: bold; vertical-align: middle;">
            Rp 0
        </td>
        <td style="vertical-align: middle; text-align: center;">
            <button type="button" class="btn btn-hapus" onclick="removeRow(this)">X</button>
        </td>
    </tr>
</template>

<!-- Import the specific Restock math logic -->
<script src="{% static 'sales/js/restock_math.js' %}?v=3"></script>
</body>
</html>
