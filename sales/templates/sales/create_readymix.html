{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ready Mix — Racik Produk</title>
    
    <!-- jQuery and Select2 for Searchable Dropdowns -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        body { font-family: 'Calibri', sans-serif; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* Header Form Grid */
        .header-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 6px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-control { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        textarea.form-control { resize: vertical; min-height: 60px; }

        /* Section Headers */
        .section-header { 
            font-size: 16px; font-weight: bold; margin-bottom: 10px; padding: 10px 15px; 
            border-radius: 4px; display: flex; align-items: center; gap: 8px;
        }
        .section-output { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .section-input { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        /* Dynamic Table */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #856404; color: white; }
        .text-right { text-align: right; }
        
        /* Buttons */
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-tambah { background-color: #856404; color: white; margin-bottom: 15px; }
        .btn-tambah:hover { background-color: #6d5303; }
        .btn-hapus { background-color: #dc3545; color: white; padding: 6px 10px; font-size: 12px; }
        .btn-hapus:hover { background-color: #a71d2a; }
        .btn-simpan { background-color: #28a745; color: white; width: 100%; font-size: 16px; padding: 15px; margin-top: 20px; }
        .btn-simpan:hover { background-color: #1e7e34; }

        /* Messages */
        .messages { list-style: none; padding: 0; margin-bottom: 20px; }
        .messages li { padding: 12px 15px; border-radius: 4px; margin-bottom: 8px; font-weight: bold; }
        .messages .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .messages .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Output Box */
        .output-box { 
            background: #d4edda; padding: 20px; border-radius: 6px; border: 1px solid #c3e6cb; 
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 Ready Mix — Racik Produk</h2>

    <!-- Flash Messages -->
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{% url 'create_readymix' %}">
        {% csrf_token %}
        
        <!-- DATE + NOTES -->
        <div class="header-form">
            <div class="form-group">
                <label for="tanggal">📅 Tanggal</label>
                <input type="date" name="tanggal" id="tanggal" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="catatan">📝 Catatan (Opsional)</label>
                <textarea name="catatan" id="catatan" class="form-control" placeholder="Contoh: Pesanan khusus toko ABC"></textarea>
            </div>
        </div>

        <!-- OUTPUT PRODUCT SECTION -->
        <div class="section-header section-output">📦 Produk Hasil (Output)</div>
        <div class="output-box">
            <div class="form-group">
                <label>Produk yang Dihasilkan</label>
                <select name="output_product" id="output-product" class="form-control" required>
                    <option value="">-- Pilih Produk Hasil --</option>
                    {% for p in products %}
                        <option value="{{ p.kode_barang }}">{{ p.kode_barang }} - {{ p.nama_barang }} (Stok: {{ p.stok_saat_ini }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah yang Dihasilkan</label>
                <input type="number" name="output_qty" class="form-control" min="1" placeholder="0" required>
            </div>
        </div>

        <!-- INGREDIENTS SECTION -->
        <div class="section-header section-input">🧪 Bahan yang Dipakai (Input)</div>
        <button type="button" class="btn btn-tambah" onclick="addRow()">+ Tambah Bahan</button>
        
        <table id="ingredients-table">
            <thead>
                <tr>
                    <th width="55%">Nama Bahan</th>
                    <th width="25%">Jumlah Dipakai</th>
                    <th width="20%">Aksi</th>
                </tr>
            </thead>
            <tbody id="ingredients-body">
                <!-- JavaScript will inject rows here -->
            </tbody>
        </table>

        <button type="submit" class="btn btn-simpan">🧪 Proses Ready Mix & Update Stok</button>
    </form>
</div>

<!-- TEMPLATE ROW (Hidden) -->
<template id="row-template">
    <tr>
        <td>
            <select name="ingredient_product[]" class="form-control select2-ingredient" required>
                <option value="">-- Pilih Bahan --</option>
                {% for p in products %}
                    <option value="{{ p.kode_barang }}">{{ p.kode_barang }} - {{ p.nama_barang }} (Stok: {{ p.stok_saat_ini }})</option>
                {% endfor %}
            </select>
        </td>
        <td>
            <input type="number" name="ingredient_qty[]" class="form-control" min="1" placeholder="0" required>
        </td>
        <td style="vertical-align: middle; text-align: center;">
            <button type="button" class="btn btn-hapus" onclick="removeRow(this)">✕</button>
        </td>
    </tr>
</template>

<script>
function addRow() {
    const template = document.getElementById('row-template');
    const tbody = document.getElementById('ingredients-body');
    const clone = template.content.cloneNode(true);
    tbody.appendChild(clone);

    // Apply Select2 to the new row's dropdown
    const newRow = tbody.lastElementChild;
    $(newRow).find('.select2-ingredient').select2({
        placeholder: "-- Cari / Pilih Bahan --",
        width: '100%'
    });
}

function removeRow(button) {
    button.closest('tr').remove();
}

$(document).ready(function() {
    // Apply Select2 to the output product dropdown
    $('#output-product').select2({
        placeholder: "-- Cari / Pilih Produk Hasil --",
        width: '100%'
    });

    // Set default date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tanggal').value = today;

    // Add the first blank ingredient row
    addRow();
});
</script>

</body>
</html>
